name: Release Memo-Ray Standalone Binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Validate the app-registry self-descriptor (schema aamp.app/1) so a
      # malformed descriptor fails the release rather than shipping broken.
      - name: Validate app.manifest.json
        run: |
          node -e "const m=require('./app.manifest.json'); if(m.schema!=='aamp.app/1') throw new Error('bad schema: '+m.schema); if(m.id!=='memo-ray') throw new Error('bad id: '+m.id); if(!Array.isArray(m.provides)||!m.provides.length) throw new Error('no provides'); console.log('app.manifest.json ok:', m.id, m.provides.map(p=>p.service+':'+p.preferredPort).join(','));"

      - name: Install root dependencies
        run: npm install

      - name: Install client dependencies
        run: npm install --prefix agent-os-dashboard/client

      - name: Install server dependencies
        run: npm install --prefix agent-os-dashboard/server

      - name: Build applications
        run: npm run build

      - name: Package binaries
        run: npm run package

      - name: Rename and prepare artifacts
        run: |
          mkdir -p release-artifacts
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          # Find and move generated binaries in dist/ to release-artifacts/ with version tags
          find dist/ -type f | while read -r file; do
            filename=$(basename "$file")
            
            if [[ "$filename" == *".exe" ]]; then
              mv "$file" "release-artifacts/memo-ray-${TAG_NAME}-win.exe"
            elif [[ "$filename" == *"macos"* ]]; then
              mv "$file" "release-artifacts/memo-ray-${TAG_NAME}-macos"
            elif [[ "$filename" == *"linux"* ]]; then
              mv "$file" "release-artifacts/memo-ray-${TAG_NAME}-linux"
            else
              mv "$file" "release-artifacts/${filename}-${TAG_NAME}"
            fi
          done
          
          echo "=== Release Artifacts ==="
          ls -la release-artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
